             C18.7,31.5 16.5,27.5 16.5,22.5
             C16.5,18.8 18.8,17 19.2,13.8
             C19.5,11.4 20.7,10 22,8.5 Z"/>
    <!-- inner flame -->
    <path d="M22,15
             C23.5,18 25,20 25,23.5
             C25,27 23.5,29.5 22,30.2
             C20.5,29.5 19,27 19,23.7
             C19,21 20.5,19 21,17
             C21.2,16 21.5,15.5 22,15 Z"/>
