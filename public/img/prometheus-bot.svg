<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">
  <defs>
    <linearGradient id="prometheusFlame" gradientUnits="userSpaceOnUse" x1="22" y1="7" x2="22" y2="33">
      <stop offset="0" stop-color="#FFD27F"/>
      <stop offset="0.5" stop-color="#FF9463"/>
      <stop offset="1" stop-color="#9E9BE3"/>
